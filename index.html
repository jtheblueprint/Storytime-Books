<style>
:root{--bg:#F7F3E3;--sf:#EFEADB;--card:#fff;--ac:#4A7C3F;--acl:#D4E8C2;--acd:#8BBF6A;--sec:#E88D5A;--secl:#FDECD8;--tx:#2D3A20;--txd:#6B7A5A;--bd:#D4DCC4;--dng:#C04A3A;--ok:#4A7C3F;--ibg:#FDFBF3;--nbg:#EFEADB;--cs:#4A7C3F;--b1:rgba(212,232,194,.4);--b2:rgba(244,196,107,.3);--b3:rgba(232,141,90,.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{height:100%;background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;overflow:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100%}
.hdr{padding:14px 16px 8px;background:var(--sf);border-bottom:2.5px solid var(--bd);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:var(--ac);line-height:1}
.hdr .sub{font-size:11px;color:var(--txd);margin-top:2px}
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px calc(68px + env(safe-area-inset-bottom,0px));scroll-behavior:smooth}
@media(min-width:700px){.cnt-inner{max-width:680px;margin:0 auto}}
@media(min-width:1000px){.cnt-inner{max-width:900px}}

/* Nav */
.nav{display:flex;background:var(--nbg);border-top:2.5px solid var(--bd);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav button{flex:1;padding:5px 0 3px;background:none;border:none;color:var(--txd);font-family:'Baloo 2',cursive;font-size:9px;font-weight:600;cursor:pointer;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:1px}
.nav button.on{color:var(--ac)}
.nav svg{width:22px;height:22px}

/* Cards */
.ccard{background:var(--card);border:2.5px solid var(--cs);border-radius:16px;position:relative;overflow:hidden}
.ccard::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(87deg,transparent,transparent 8px,var(--cs) 8px,transparent 8.5px);opacity:.03;pointer-events:none}

/* Inputs */
.inp{width:100%;padding:10px 14px;border-radius:12px;border:2px solid var(--bd);background:var(--ibg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:var(--txd);opacity:.5}

/* Buttons */
.bp{background:var(--ac);color:var(--card);border:none;border-radius:14px;padding:10px 20px;font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.bp:active{transform:scale(.97)}.bp:disabled{opacity:.35;cursor:not-allowed}
.bg{background:transparent;color:var(--ac);border:2px solid var(--ac);border-radius:14px;padding:10px 20px;font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;cursor:pointer}
.bd{background:var(--dng);color:#fff;border:none;border-radius:14px;padding:10px 20px;font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;cursor:pointer}
.bm{background:var(--bd);color:var(--txd);border:none;border-radius:14px;padding:10px 20px;font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;cursor:pointer}

.pill{padding:5px 14px;border-radius:20px;border:2px solid var(--bd);background:transparent;color:var(--txd);font-family:'Baloo 2',cursive;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.pill.on{background:var(--ac);color:var(--card);border-color:var(--ac)}

/* Cover */
.cov{border-radius:8px;object-fit:cover;flex-shrink:0;border:2px solid var(--bd)}
.covp{border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--acl);border:2px dashed var(--bd)}

/* Widget grid */
.wg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wi{background:var(--card);border:2px solid var(--bd);border-radius:16px;padding:14px;overflow:hidden}
.wi.full{grid-column:1/-1}
.wl{font-family:'Baloo 2',cursive;font-size:11px;color:var(--txd);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.wv{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:var(--ac);line-height:1.1}
.ws{font-size:11px;color:var(--txd);margin-top:4px}
@media(min-width:700px){.wg{grid-template-columns:repeat(3,1fr);gap:14px}}
@media(min-width:1000px){.wg{grid-template-columns:repeat(4,1fr);gap:16px}.wi.full{grid-column:1/3}}

/* Recent strip */
.rstrip{display:flex;gap:12px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.rstrip::-webkit-scrollbar{display:none}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:20px;font-size:14px;font-weight:700;font-family:'Baloo 2',cursive;z-index:100;animation:ti .3s ease,to .3s ease 1.7s forwards;color:#fff;border:2px solid var(--cs)}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-10px)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}

/* Modal */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.msheet{background:var(--sf);border-radius:20px 20px 0 0;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-height:80vh;overflow-y:auto;animation:su .25s ease;border-top:3px solid var(--cs)}
.msheet h3{font-family:'Baloo 2',cursive;font-size:18px;color:var(--ac);margin-bottom:14px}
@keyframes fi{from{opacity:0}}
@keyframes su{from{transform:translateY(100%)}}

/* Toggle */
.tog{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;background:var(--bd)}
.tog.on{background:var(--ac)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(20px)}

/* Theme circles */
.thc{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s}
.thc.on{border-color:var(--ac);transform:scale(1.15)}

/* Calendar */
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-h{text-align:center;font-size:11px;font-weight:700;font-family:'Baloo 2',cursive;color:var(--txd);padding:4px 0}
.cal-c{min-height:78px;border-radius:10px;border:1.5px solid var(--bd);padding:3px;display:flex;flex-direction:column;transition:all .2s}
.cal-c.today{border:2.5px solid var(--ac);background:var(--acl)}
.cal-c.has{background:var(--card)}
.cal-d{font-size:12px;font-weight:600;font-family:'Baloo 2',cursive;color:var(--tx);text-align:center;margin-bottom:2px}
.cal-c.today .cal-d{font-weight:800;color:var(--ac)}
.cal-covers{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;flex:1;align-items:flex-start}
.cal-cov{width:100%;max-width:38px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--bd)}
.cal-covp{width:100%;max-width:38px;height:48px;border-radius:4px;background:var(--acl);border:1px dashed var(--bd);display:flex;align-items:center;justify-content:center;font-size:8px;font-family:'Baloo 2',cursive;color:var(--txd);text-align:center;line-height:1.1;overflow:hidden;padding:2px}
@media(min-width:700px){.cal-c{min-height:100px}.cal-cov,.cal-covp{height:60px;max-width:46px}}
@media(min-width:1000px){.cal-c{min-height:120px}.cal-cov,.cal-covp{height:74px;max-width:54px}}

/* Pick */
.pcard{background:var(--card);border:3px solid var(--ac);border-radius:20px;padding:24px;text-align:center;max-width:320px;margin:0 auto;box-shadow:0 4px 20px var(--b1)}
.pcard.shuf{border-color:var(--bd);box-shadow:none}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

/* View fade */
.view{display:none;animation:vu .25s ease}
.view.on{display:block}
@keyframes vu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Book row */
.brow{display:flex;gap:10px;padding:10px;align-items:center;cursor:pointer}
.btitle{font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bauth{font-size:12px;color:var(--txd)}
.bmeta{display:flex;gap:8px;margin-top:3px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txd)}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
  <div><h1>Storytime Shelf</h1><div class="sub">Bedtime reading tracker</div></div>
  <div style="display:flex;gap:8px;align-items:center">
    <button onclick="toggleMode()" style="background:none;border:none;cursor:pointer;padding:4px" id="mode-btn"></button>
  </div>
</div>
<div class="cnt"><div class="cnt-inner" id="content"></div></div>
<nav class="nav" id="nav"></nav>
</div>

<script>

// DATABASE (Dexie / IndexedDB)
// ══════════════════════════════════════════
const db=new Dexie('StorytimeShelf');
db.version(1).stores({books:'id,title,author,isbn,addedAt',reads:'++autoId,bookId,date',settings:'key'});

const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const weekStart=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d.toISOString().slice(0,10)};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const plural=(n,w)=>`${n} ${w}${n===1?'':'s'}`;
const daysAgo=d=>{if(!d)return 999;return Math.floor((Date.now()-new Date(d+'T12:00:00'))/864e5)};
const daysAgoLabel=d=>{if(!d)return'';const n=daysAgo(d);return n===0?'Today':n===1?'Yesterday':n+'d ago'};

async function addBook(d){const b={id:genId(),title:d.title||'Untitled',author:d.author||'',isbn:d.isbn||'',cover:d.cover||'',pageCount:d.pageCount||null,publisher:d.publisher||'',year:d.year||'',addedAt:new Date().toISOString()};await db.books.add(b);return b}
async function logRead(id){await db.reads.add({bookId:id,date:today()})}
async function removeBook(id){await db.transaction('rw',db.books,db.reads,async()=>{await db.books.delete(id);await db.reads.where('bookId').equals(id).delete()})}

async function getBookStats(id){const r=await db.reads.where('bookId').equals(id).toArray();const t=r.length;const l=t?r[t-1].date:null;const ws=weekStart();const w=r.filter(x=>x.date>=ws).length;return{total:t,last:l,thisWeek:w}}

async function getGlobalStats(books){
  const allR=await db.reads.toArray();const ws=weekStart();
  const totalReads=allR.length;const weekReads=allR.filter(r=>r.date>=ws).length;
  const allDates=new Set(allR.map(r=>r.date));let streak=0;const d=new Date();d.setHours(12,0,0,0);
  let ck=today();if(!allDates.has(ck)){const y=new Date(d);y.setDate(y.getDate()-1);ck=y.toISOString().slice(0,10)}
  const cd=new Date(ck+'T12:00:00');for(let i=0;i<365;i++){if(allDates.has(cd.toISOString().slice(0,10))){streak++;cd.setDate(cd.getDate()-1)}else break}
  const rc={};allR.forEach(r=>{rc[r.bookId]=(rc[r.bookId]||0)+1});
  let mrId=null,mrC=0;Object.entries(rc).forEach(([id,c])=>{if(c>mrC){mrId=id;mrC=c}});
  const mostRead=mrId?books.find(b=>b.id===mrId):null;
  const sorted=[...allR].sort((a,b)=>b.date.localeCompare(a.date));const seen=new Set();const recent=[];
  for(const r of sorted){if(!seen.has(r.bookId)){seen.add(r.bookId);const bk=books.find(b=>b.id===r.bookId);if(bk)recent.push({book:bk,date:r.date})}if(recent.length>=3)break}
  return{totalBooks:books.length,totalReads,weekReads,streak,mostRead,mostCount:mrC,recent,readCounts:rc}
}

async function pickNext(books){
  if(!books.length)return null;const allR=await db.reads.toArray();const ws=weekStart();
  const rc={},wc={},lr={};allR.forEach(r=>{rc[r.bookId]=(rc[r.bookId]||0)+1;if(r.date>=ws)wc[r.bookId]=(wc[r.bookId]||0)+1;if(!lr[r.bookId]||r.date>lr[r.bookId])lr[r.bookId]=r.date});
  const scored=books.map(b=>{const w=wc[b.id]||0;const t=rc[b.id]||0;const ds=daysAgo(lr[b.id]);return{book:b,score:(w===0?50:0)+ds*2+Math.max(0,10-t)*3+Math.random()*10}});
  scored.sort((a,b)=>b.score-a.score);const pool=scored.slice(0,Math.min(5,scored.length));
  const ts=pool.reduce((s,p)=>s+p.score,0);let r=Math.random()*ts;for(const p of pool){r-=p.score;if(r<=0)return p.book}return pool[0].book
}

async function getSetting(k,def){try{const r=await db.settings.get(k);return r?r.value:def}catch{return def}}
async function setSetting(k,v){await db.settings.put({key:k,value:v})}

// OPEN LIBRARY
// ══════════════════════════════════════════
async function searchOL(q){
  const isISBN=/^[\d\-]{10,17}$/.test(q.replace(/[\s-]/g,''));
  if(isISBN){const c=q.replace(/[\s-]/g,'');const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${c}&format=json&jscmd=data`);const d=await r.json();const k=Object.keys(d)[0];if(!k)return[];const b=d[k];return[{title:b.title||'',author:(b.authors||[]).map(a=>a.name).join(', '),isbn:c,cover:b.cover?.medium||b.cover?.small||'',pageCount:b.number_of_pages||null,publisher:(b.publishers||[]).map(p=>p.name).join(', '),year:b.publish_date||''}]}
  const r=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=8&fields=key,title,author_name,isbn,cover_i,publisher,first_publish_year,number_of_pages_median`);const d=await r.json();
  return(d.docs||[]).map(x=>({title:x.title||'',author:(x.author_name||[]).join(', '),isbn:(x.isbn||[])[0]||'',cover:x.cover_i?`https://covers.openlibrary.org/b/id/${x.cover_i}-M.jpg`:'',pageCount:x.number_of_pages_median||null,publisher:(x.publisher||[]).slice(0,2).join(', '),year:x.first_publish_year?String(x.first_publish_year):''}))
}

function coverHTML(src,title,sz=50){

  return `<img class="cov" src="${esc(src)}" alt="${esc(title)}" style="width:${sz}px;height:${Math.round(sz*1.35)}px" onerror="this.outerHTML='<div class=covp style=width:${sz}px;height:${Math.round(sz*1.35)}px>${icon('book',Math.round(sz*.4))}</div>'">`
}
function toast(msg,bg){const e=document.createElement('div');e.className='toast';e.style.background=bg||'var(--ok)';e.textContent=msg;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function csvCell(v){const s=String(v??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:s}

let scannerInstance=null;

function openScanner(){
  const ov=document.createElement('div');ov.className='mover';ov.id='scan-overlay';
  ov.innerHTML=`<div class="msheet" style="max-height:90vh">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="margin:0">Scan Barcode</h3>
      <button class="bm" onclick="closeScanner()" style="padding:6px 14px;font-size:13px">Close</button>
    </div>
    <div style="font-size:12px;color:var(--txd);margin-bottom:10px">Point your camera at the barcode on the back of the book.</div>
    <div id="scanner-box" style="width:100%;border-radius:12px;overflow:hidden;background:#000;min-height:250px"></div>
    <div id="scan-status" style="margin-top:10px;text-align:center;font-size:13px;color:var(--txd)"></div>
    <div id="scan-result" style="margin-top:8px"></div>
  </div>`;
  document.body.appendChild(ov);
  startScanner();
}

function closeScanner(){
  if(scannerInstance){try{scannerInstance.stop()}catch{}scannerInstance=null}
  const ov=document.getElementById('scan-overlay');if(ov)ov.remove();
}

async function startScanner(){
  const box=document.getElementById('scanner-box');
  const status=document.getElementById('scan-status');
  if(!box)return;
  try{
    scannerInstance=new Html5Qrcode('scanner-box');
    await scannerInstance.start(
      {facingMode:'environment'},
      {fps:10,qrbox:{width:280,height:150},aspectRatio:1.5},
      onScanSuccess,
      ()=>{}
    );
  }catch(err){
    status.innerHTML=`<div style="color:var(--dng)">Camera access denied or unavailable. Try entering the ISBN manually.</div>`;
  }
}

async function onScanSuccess(decoded){
  if(scannerInstance){try{await scannerInstance.stop()}catch{}scannerInstance=null}
  const status=document.getElementById('scan-status');
  const result=document.getElementById('scan-result');
  const isbn=decoded.replace(/[\s-]/g,'');
  status.innerHTML=`<div style="color:var(--ac);font-weight:700">Found ISBN: ${isbn}</div><div style="color:var(--txd);margin-top:4px">Looking up book…</div>`;
  try{
    const books=await searchOL(isbn);
    if(books.length){
      const b=books[0];
      result.innerHTML=`<div class="ccard" style="display:flex;gap:10px;padding:10px;align-items:center">${coverHTML(b.cover,b.title,50)}<div style="flex:1;min-width:0"><div class="btitle">${esc(b.title)}</div><div class="bauth">${esc(b.author)}</div>${b.year?`<div style="font-size:11px;color:var(--txd);font-family:'JetBrains Mono'">${esc(b.year)}</div>`:''}</div><button class="bp" onclick="scanAdd()" style="padding:8px 16px;font-size:15px">Add</button></div>`;
      window._scanResult=b;
    }else{
      status.innerHTML=`<div style="color:var(--dng)">ISBN ${isbn} not found in Open Library. Try searching by title instead.</div>`;
    }
  }catch{
    status.innerHTML=`<div style="color:var(--dng)">Lookup failed — check connection.</div>`;
  }
}

async function scanAdd(){
  const b=window._scanResult;if(!b)return;
  if(S.books.find(x=>(b.isbn&&x.isbn===b.isbn)||x.title.toLowerCase()===b.title.toLowerCase())){toast('"'+b.title+'" already on shelf','var(--sec)');closeScanner();return}
  await addBook(b);S.books=await db.books.toArray();toast('Added "'+b.title+'"!');closeScanner();renderView()
}

async function renderShelf(c){

  const sorted=[...f].sort((a,b)=>{const sa=stats[a.id]||{total:0,last:null};const sb=stats[b.id]||{total:0,last:null};
    if(S.shelfSort==='recent')return(sb.last||'0').localeCompare(sa.last||'0');if(S.shelfSort==='most')return sb.total-sa.total;
    if(S.shelfSort==='alpha')return a.title.localeCompare(b.title);if(S.shelfSort==='added')return(b.addedAt||'').localeCompare(a.addedAt||'');return 0});
  c.innerHTML=`<input class="inp" placeholder="Search your shelf…" value="${esc(S.shelfSearch)}" oninput="S.shelfSearch=this.value;renderView()" style="margin-bottom:10px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${['recent:Last Read','most:Most Read','alpha:A → Z','added:Added'].map(s=>{const[k,l]=s.split(':');return`<button class="pill ${S.shelfSort===k?'on':''}" onclick="S.shelfSort='${k}';renderView()">${l}</button>`}).join('')}</div>
    <div style="font-size:12px;color:var(--txd);margin-bottom:10px">${plural(S.books.length,'book')} on shelf</div>
    ${sorted.length===0?`<div style="text-align:center;padding:40px 20px;color:var(--txd);font-family:'Baloo 2'">${S.books.length===0?'Your shelf is empty — add some books!':'No matches.'}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px">${sorted.map(b=>{
      const s=stats[b.id]||{total:0,last:null,thisWeek:0};const isExp=S.expanded===b.id;
      return`<div class="ccard"><div class="brow" onclick="S.expanded=S.expanded==='${b.id}'?null:'${b.id}';S.confirmDel=null;renderView()">
        ${coverHTML(b.cover,b.title,48)}<div style="flex:1;min-width:0"><div class="btitle">${esc(b.title)}</div>${b.author?`<div class="bauth">${esc(b.author)}</div>`:''}<div class="bmeta"><span style="color:var(--ac)">${s.total}×</span>${s.last?`<span>last ${s.last}</span>`:''}${s.thisWeek>0?`<span style="color:var(--ok)">${s.thisWeek} this wk</span>`:''}</div></div>
        <button class="bp" onclick="event.stopPropagation();quickLog('${b.id}')" style="padding:7px 12px;font-size:16px;border-radius:12px">${icon('check',18)}</button></div>
        ${isExp?`<div style="padding:12px;border-top:2px dashed var(--bd)"><div style="display:flex;gap:12px">${coverHTML(b.cover,b.title,76)}<div style="font-size:12px;color:var(--txd);line-height:1.7">${b.author?`<div><strong style="color:var(--tx)">Author:</strong> ${esc(b.author)}</div>`:''}${b.isbn?`<div><strong style="color:var(--tx)">ISBN:</strong> ${esc(b.isbn)}</div>`:''}${b.pageCount?`<div><strong style="color:var(--tx)">Pages:</strong> ${b.pageCount}</div>`:''}${b.publisher?`<div><strong style="color:var(--tx)">Publisher:</strong> ${esc(b.publisher)}</div>`:''}${b.year?`<div><strong style="color:var(--tx)">Year:</strong> ${esc(b.year)}</div>`:''}<div><strong style="color:var(--tx)">Read:</strong> ${plural(s.total,'time')}</div></div></div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="bg" style="flex:1;font-size:13px;padding:8px" onclick="quickLog('${b.id}')">Log Tonight's Read</button>${S.confirmDel===b.id?`<button class="bd" style="font-size:13px;padding:8px 12px" onclick="doRemove('${b.id}')">Confirm Remove</button>`:`<button class="bm" style="font-size:13px;padding:8px 12px" onclick="event.stopPropagation();S.confirmDel='${b.id}';renderView()">Remove</button>`}</div></div>`:''}</div>`}).join('')}</div>`;
}
async function quickLog(id){await logRead(id);S.books=await db.books.toArray();toast('Read logged!');renderView()}
async function doRemove(id){await removeBook(id);S.expanded=null;S.confirmDel=null;S.books=await db.books.toArray();toast('Removed','var(--sec)');renderView()}

// ══════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════
async function renderCalendar(c){
  const allR=await db.reads.toArray();const byDate={};allR.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r.bookId)});
  const booksById={};S.books.forEach(b=>{booksById[b.id]=b});
  const y=S.calYear,m=S.calMonth;const mName=new Date(y,m).toLocaleString('en-US',{month:'long',year:'numeric'});
  const todayStr=today();const isCur=new Date().getFullYear()===y&&new Date().getMonth()===m;
  const firstDay=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();
  let cells='';for(let i=0;i<firstDay;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===todayStr;const ids=[...new Set(byDate[ds]||[])];const dayBooks=ids.map(id=>booksById[id]).filter(Boolean);
    const cls=`cal-c${isT?' today':''}${dayBooks.length?' has':''}`;
    cells+=`<div class="${cls}"><div class="cal-d">${d}</div><div class="cal-covers">${dayBooks.slice(0,3).map(b=>b.cover?`<img class="cal-cov" src="${esc(b.cover)}" alt="${esc(b.title)}" onerror="this.outerHTML='<div class=cal-covp>${esc(b.title.slice(0,10))}</div>'">`:`<div class="cal-covp">${esc(b.title.slice(0,12))}</div>`).join('')}${dayBooks.length>3?`<div style="font-size:9px;color:var(--txd);font-family:'Baloo 2';font-weight:700;width:100%;text-align:center">+${dayBooks.length-3}</div>`:''}</div></div>`;
  }
  c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <button class="bg" style="padding:6px 10px;border-radius:12px" onclick="calPrev()">${icon('chL',22)}</button>
    <div style="text-align:center"><div style="font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--tx)">${mName}</div>${!isCur?`<button class="bp" onclick="calToday()" style="padding:3px 12px;font-size:11px;border-radius:10px;margin-top:4px">Today</button>`:''}</div>
    <button class="bg" style="padding:6px 10px;border-radius:12px" onclick="calNext()">${icon('chR',22)}</button>
  </div>
  <div class="cal-g" style="margin-bottom:6px">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-h">${d}</div>`).join('')}</div>
  <div class="cal-g">${cells}</div>`;
}
function calPrev(){if(S.calMonth===0){S.calMonth=11;S.calYear--}else S.calMonth--;renderView()}
function calNext(){if(S.calMonth===11){S.calMonth=0;S.calYear++}else S.calMonth++;renderView()}
function calToday(){const n=new Date();S.calYear=n.getFullYear();S.calMonth=n.getMonth();renderView()}

// ══════════════════════════════════════════
// PICK / TONIGHT
// ══════════════════════════════════════════
async function renderPick(c){
  let pickHTML='';
  if(S.pick&&!S.pickShuf){
    const ps=await getBookStats(S.pick.id);
    pickHTML=`<div class="pcard">${coverHTML(S.pick.cover,S.pick.title,90)}<div style="font-family:'Baloo 2';font-weight:800;font-size:20px;margin-top:14px;color:var(--tx)">${esc(S.pick.title)}</div>${S.pick.author?`<div style="color:var(--txd);font-size:14px;margin-top:4px">${esc(S.pick.author)}</div>`:''}<div style="font-family:'JetBrains Mono';font-size:12px;color:var(--txd);margin-top:10px;line-height:1.8"><div>Read ${plural(ps.total,'time')} total</div><div>${ps.thisWeek} time${ps.thisWeek!==1?'s':''} this week</div>${ps.last?`<div>Last read: ${ps.last}</div>`:''}</div><button class="bp" onclick="quickLog('${S.pick.id}')" style="margin-top:14px;width:100%;font-size:15px;padding:12px">We Read This Tonight ${icon('check',16)}</button></div>`;
  } else if(S.pick&&S.pickShuf){
    pickHTML=`<div class="pcard shuf">${coverHTML(S.pick.cover,S.pick.title,80)}<div style="font-family:'Baloo 2';font-weight:800;font-size:18px;margin-top:12px">${esc(S.pick.title)}</div></div>`;
  }
  c.innerHTML=`<div style="text-align:center;color:var(--txd);font-size:15px;margin-bottom:20px;line-height:1.5">Picks books not yet read this week, or read the fewest times overall.</div>
    <div style="text-align:center;margin-bottom:28px"><button class="bp" onclick="doPick()" ${S.books.length?'':'disabled'} style="font-size:16px;padding:14px 32px;border-radius:28px">${S.pick&&!S.pickShuf?'Pick Again':"What Should We Read?"}</button></div>
    <div id="pick-result">${pickHTML}</div>${!S.books.length?'<div style="text-align:center;color:var(--txd);margin-top:20px">Add some books first!</div>':''}`;
}
function doPick(){
  if(!S.books.length)return;S.pickShuf=true;S.pick=null;let count=0;
  const iv=setInterval(()=>{S.pick=S.books[Math.floor(Math.random()*S.books.length)];renderView();count++;
    if(count>=8){clearInterval(iv);pickNext(S.books).then(b=>{S.pick=b;S.pickShuf=false;renderView()})}
  },120);
}

// ══════════════════════════════════════════
// ADD
// ══════════════════════════════════════════
function renderAdd(c){
  c.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:14px"><button class="pill ${S.addMode==='search'?'on':''}" onclick="S.addMode='search';renderView()">Search Online</button><button class="pill ${S.addMode==='manual'?'on':''}" onclick="S.addMode='manual';renderView()">Manual Entry</button><button class="pill" onclick="openScanner()" style="background:var(--sec);color:var(--card);border-color:var(--sec)">${icon('scan',14)} Scan</button></div><div id="add-body">${S.addMode==='search'?renderAddSearch():renderAddManual()}</div>`;
}
function renderAddSearch(){
  return`<div style="display:flex;gap:8px;margin-bottom:10px"><input class="inp" style="flex:1" id="sq" placeholder="Title, author, or ISBN…" onkeydown="if(event.key==='Enter')doSearch()"><button class="bp" onclick="doSearch()" ${S.searchLoading?'disabled':''} style="white-space:nowrap">${S.searchLoading?'…':'Search'}</button></div><div id="serr"></div><div style="display:flex;flex-direction:column;gap:8px" id="sres">${S.searchResults.map((r,i)=>`<div class="ccard" style="display:flex;gap:10px;padding:10px;align-items:center">${coverHTML(r.cover,r.title,42)}<div style="flex:1;min-width:0"><div class="btitle">${esc(r.title)}</div><div class="bauth">${esc(r.author)}</div>${r.year?`<div style="font-size:11px;color:var(--txd);font-family:'JetBrains Mono'">${esc(r.year)}</div>`:''}</div><button class="bp" onclick="addFromSearch(${i})" style="padding:6px 14px;font-size:18px">+</button></div>`).join('')}</div>`;
}
function renderAddManual(){
  return`<div style="display:flex;flex-direction:column;gap:10px"><input class="inp" id="mt" placeholder="Title *"><input class="inp" id="ma" placeholder="Author"><input class="inp" id="mi" placeholder="ISBN (optional)"><input class="inp" id="mp" placeholder="Page count (optional)" type="number"><button class="bp" style="width:100%" onclick="doManualAdd()">Add to Shelf</button></div>`;
}
async function doSearch(){
  const el=document.getElementById('sq');if(!el||!el.value.trim())return;
  S.searchLoading=true;S.searchResults=[];renderView();
  const q=el.value;try{S.searchResults=await searchOL(q.trim());if(!S.searchResults.length)document.getElementById('serr').innerHTML=`<div style="color:var(--dng);font-size:13px;margin-bottom:8px">No results — try different keywords or enter manually.</div>`}catch{document.getElementById('serr').innerHTML=`<div style="color:var(--dng);font-size:13px;margin-bottom:8px">Search failed — check connection or enter manually.</div>`}
  S.searchLoading=false;renderView();const nel=document.getElementById('sq');if(nel){nel.value=q;nel.focus()}
}
async function addFromSearch(i){
  const r=S.searchResults[i];if(!r)return;
  if(S.books.find(b=>(r.isbn&&b.isbn===r.isbn)||b.title.toLowerCase()===r.title.toLowerCase())){toast('"'+r.title+'" already on shelf','var(--sec)');return}
  await addBook(r);S.books=await db.books.toArray();toast('Added "'+r.title+'"!')
}
async function doManualAdd(){
  const t=document.getElementById('mt').value.trim();if(!t){toast('Title is required','var(--dng)');return}
  const a=document.getElementById('ma').value.trim();const isbn=document.getElementById('mi').value.trim();const p=parseInt(document.getElementById('mp').value)||null;
  if(S.books.find(b=>b.title.toLowerCase()===t.toLowerCase())){toast('"'+t+'" already on shelf','var(--sec)');return}
  await addBook({title:t,author:a,isbn,pageCount:p});S.books=await db.books.toArray();toast('Added "'+t+'"!');renderView()
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function renderSettings(c){
  c.innerHTML=`<h2 style="font-family:'Baloo 2';font-size:18px;color:var(--ac);margin-bottom:14px">Appearance</h2>
    <div class="ccard" style="padding:14px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-family:'Baloo 2';font-size:14px">${S.mode==='dark'?'Dark Mode':'Light Mode'}</div><button class="tog ${S.mode==='dark'?'on':''}" onclick="toggleMode()"></button></div>
      <div style="font-family:'Baloo 2';font-size:13px;color:var(--txd);margin-bottom:8px">Color Theme</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">${Object.entries(TH).map(([id,t])=>`<button onclick="changeTheme('${id}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:12px;border:${S.themeId===id?'2.5px solid var(--ac)':'2px solid var(--bd)'};background:${S.themeId===id?'var(--acl)':'transparent'};cursor:pointer;transition:all .2s"><div style="display:flex;gap:2px"><div style="width:16px;height:16px;border-radius:50%;background:${t.light.ac}"></div><div style="width:16px;height:16px;border-radius:50%;background:${t.light.sec}"></div></div><div style="font-size:10px;font-family:'Baloo 2';font-weight:600;color:var(--tx)">${t.em} ${t.name.split(' ')[0]}</div></button>`).join('')}</div>
    </div>
    <h2 style="font-family:'Baloo 2';font-size:18px;color:var(--ac);margin-bottom:14px">Data & Backup</h2>
    <div class="ccard" style="padding:14px;margin-bottom:20px">
      <div style="font-size:13px;color:var(--txd);margin-bottom:12px">${plural(S.books.length,'book')} on shelf</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="bp" style="width:100%" onclick="doExportJSON()">Export Backup (JSON)</button>
        <button class="bg" style="width:100%" onclick="doExportCSV()">Export Spreadsheet (CSV)</button>
        <label class="bg" style="width:100%;cursor:pointer;text-align:center">Import Backup (JSON)<input type="file" accept=".json" onchange="doImport(event)" style="display:none"></label>
      </div>
    </div>
    <h2 style="font-family:'Baloo 2';font-size:18px;color:var(--ac);margin-bottom:14px">About</h2>
    <div class="ccard" style="padding:14px;margin-bottom:20px"><div style="font-size:14px;line-height:1.6;color:var(--txd)"><strong style="color:var(--tx)">Storytime Shelf</strong> tracks bedtime reading for your family. All data stored locally (IndexedDB).<br><br>Book lookup: <strong style="color:var(--tx)">Open Library</strong> (requires internet). Everything else works offline.<br><br><span style="font-family:'JetBrains Mono';font-size:11px">v1.0 · Built with love for bedtime</span></div></div>
    <h2 style="font-family:'Baloo 2';font-size:18px;color:var(--dng);margin-bottom:14px">Danger Zone</h2>
    <div class="ccard" style="padding:14px;border-color:var(--dng)"><button class="bd" style="width:100%" onclick="confirmClear()">Clear All Data</button></div>`;
}

async function doExportJSON(){
  const books=await db.books.toArray();const reads=await db.reads.toArray();
  const blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),books,reads},null,2)],{type:'application/json'});
  dl(blob,`storytime-backup-${today()}.json`);toast('Backup exported!')
}
async function doExportCSV(){
  const books=await db.books.toArray();const reads=await db.reads.toArray();
  const h=['Book Title','Author','ISBN','Pages','Publisher','Year','Date Read','Read #','Total Reads','Added Date'];
  const rows=[h.join(',')];
  for(const b of books){const br=reads.filter(r=>r.bookId===b.id).sort((a,b)=>a.date.localeCompare(b.date));
    if(!br.length)rows.push([b.title,b.author,b.isbn,b.pageCount||'',b.publisher,b.year,'','0','0',b.addedAt?.slice(0,10)||''].map(csvCell).join(','));
    else br.forEach((r,i)=>rows.push([b.title,b.author,b.isbn,b.pageCount||'',b.publisher,b.year,r.date,i+1,br.length,b.addedAt?.slice(0,10)||''].map(csvCell).join(',')))}
  dl(new Blob([rows.join('\n')],{type:'text/csv'}),`storytime-log-${today()}.csv`);toast('Spreadsheet exported!')
}
async function doImport(ev){
  const file=ev.target.files[0];if(!file)return;
  try{const data=JSON.parse(await file.text());if(!data.books||!Array.isArray(data.books))throw 0;
    await db.transaction('rw',db.books,db.reads,async()=>{
      for(const b of data.books){const ex=await db.books.get(b.id);if(!ex)await db.books.add(b)}
      if(data.reads)for(const r of data.reads)await db.reads.add({bookId:r.bookId,date:r.date});
      if(!data.reads&&data.books[0]?.readLog)for(const b of data.books)if(b.readLog)for(const e of b.readLog)await db.reads.add({bookId:b.id,date:e.date||e})
    });S.books=await db.books.toArray();toast('Imported!');renderView()
  }catch{toast('Invalid backup file','var(--dng)')}ev.target.value='';
}
function confirmClear(){
  const ov=document.createElement('div');ov.className='mover';ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="msheet"><h3 style="color:var(--dng)">Clear All Data?</h3><p style="color:var(--txd);font-size:14px;margin-bottom:16px">This permanently deletes all books and reading history. Export a backup first.</p><div style="display:flex;gap:8px"><button class="bm" style="flex:1" onclick="this.closest('.mover').remove()">Cancel</button><button class="bd" style="flex:1" onclick="doClear(this)">Clear Everything</button></div></div>`;
  document.body.appendChild(ov);
}
async function doClear(btn){
  await db.transaction('rw',db.books,db.reads,db.settings,async()=>{await db.books.clear();await db.reads.clear();await db.settings.clear()});
  S.books=[];S.widgets=['recentBooks','quickAdd','totalBooks','totalReads','weekReads','streak','mostRead'];
  btn.closest('.mover').remove();toast('All data cleared','var(--sec)');renderView()
}

// ══════════════════════════════════════════
// GLOBAL ACTIONS
// ══════════════════════════════════════════
function changeTheme(id){S.themeId=id;applyTheme(id,S.mode);setSetting('theme',id);renderNav();renderView()}
function toggleMode(){S.mode=S.mode==='light'?'dark':'light';applyTheme(S.themeId,S.mode);setSetting('mode',S.mode);document.getElementById('mode-btn').innerHTML=S.mode==='dark'?icon('sun',22):icon('moon',22);renderNav();renderView()}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
(async()=>{
  S.books=await db.books.toArray();
  S.themeId=await getSetting('theme','meadow');
  S.mode=await getSetting('mode','light');
  S.widgets=await getSetting('widgets',S.widgets);
  applyTheme(S.themeId,S.mode);
  document.getElementById('mode-btn').innerHTML=S.mode==='dark'?icon('sun',22):icon('moon',22);
  renderNav();renderView();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
</script>
