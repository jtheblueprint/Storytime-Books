<style>
/* ══════════════════════════════════
   DESIGN TOKENS
   ══════════════════════════════════ */
:root {
  --bg:#F7F3E3;--sf:#EFEADB;--card:#fff;--ac:#4A7C3F;--acl:#D4E8C2;--acd:#8BBF6A;
  --sec:#E88D5A;--secl:#FDECD8;--tx:#2D3A20;--txd:#6B7A5A;--bd:#D4DCC4;
  --dng:#C04A3A;--ok:#4A7C3F;--ibg:#FDFBF3;--nbg:#EFEADB;--cs:#4A7C3F;
  --b1:rgba(212,232,194,.45);--b2:rgba(244,196,107,.35);--b3:rgba(232,141,90,.3);
  --fd:'Baloo 2',cursive;--fb:'Nunito',sans-serif;--fm:'JetBrains Mono',monospace;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --cw:64px;--ch:88px;--cr:14px;
  /* Liquid Glass nav tokens (mapped from app theme) */
  --primary:var(--ac);--text-light:var(--txd);--shadow:rgba(45,58,32,.07);--border-glass:var(--bd);
  /* Nav geometry */
  --bar-h:58px;--bar-h-compact:48px;--bar-bottom:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{min-height:100%;min-height:100dvh;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fb);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ══════════════════════════════════
   HEADER
   ══════════════════════════════════ */
.hdr{padding:10px 16px 8px;padding-top:calc(10px + var(--st));background:var(--sf);border-bottom:2px solid var(--bd);flex-shrink:0;display:flex;justify-content:space-between;align-items:center;z-index:10}
@media(display-mode:standalone){.hdr{padding-top:calc(env(safe-area-inset-top,54px) + 6px)}}
.hdr h1{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--ac);line-height:1}
.hdr .sub{font-size:10px;color:var(--txd);margin-top:1px}
.hdr-r{display:flex;gap:6px;align-items:center}
.hdr-r button{background:none;border:none;cursor:pointer;padding:4px;display:flex}

/* ══════════════════════════════════
   CONTENT AREA
   ══════════════════════════════════ */
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px calc(var(--bar-h) + var(--bar-bottom) + var(--sb) + 20px);-webkit-overflow-scrolling:touch}
.ci{max-width:600px;margin:0 auto}
@media(min-width:768px){.ci{max-width:720px}}
@media(min-width:1024px){.ci{max-width:920px}}

/* ══════════════════════════════════
   LIQUID GLASS NAVIGATION
   Layer 0: blur surface (EMPTY)
   Layer 2: icons + pill (NO filter)
   ══════════════════════════════════ */
.tabbar-blur,.tabbar {
  position:fixed;
  left:50%;
  display:flex;
  align-items:center;
  bottom:var(--bar-bottom);
  width:calc(100% - 24px);
  max-width:456px;
  height:var(--bar-h);
  border-radius:calc(var(--bar-h) / 2);
  transition:bottom .4s cubic-bezier(.32,0,.15,1),
    width .4s cubic-bezier(.32,0,.15,1),
    height .4s cubic-bezier(.32,0,.15,1),
    border-radius .4s cubic-bezier(.32,0,.15,1);
}

/* Layer 0: Blur — NO children, NO text */
.tabbar-blur {
  z-index:199;
  transform:translateX(-50%) translateZ(0);
  -webkit-backdrop-filter:blur(24px) saturate(170%);
  backdrop-filter:blur(24px) saturate(170%);
  will-change:opacity;
  background:color-mix(in srgb, var(--bg) 68%, transparent);
  border:1px solid color-mix(in srgb, var(--border-glass) 50%, transparent);
  box-shadow:0 6px 28px var(--shadow);
}
.tabbar-blur::before {
  content:'';position:absolute;top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
}

/* Layer 2: Interactive — NO backdrop-filter */
.tabbar {
  z-index:200;
  overflow:visible;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  transform:translateX(-50%) translateZ(0);
  background:transparent !important;
  border:none !important;
  box-shadow:none !important;
}

/* Compact mode */
.tabbar-blur.compact,.tabbar.compact {
  bottom:10px;width:calc(100% - 40px);height:var(--bar-h-compact);
  border-radius:calc(var(--bar-h-compact) / 2);
}
.compact .tab-lbl{font-size:0 !important;opacity:0 !important;max-height:0 !important;margin:0 !important}

/* ── Pill (two layers: solid + glass) ── */
.pill-solid,.pill-glass {
  position:absolute;top:50%;left:0;
  will-change:transform,opacity;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  pointer-events:none;
}
.pill-solid {
  background:color-mix(in srgb, var(--primary) 10%, transparent);
  border:1.5px solid color-mix(in srgb, var(--primary) 14%, transparent);
  box-shadow:inset 0 1px 1px color-mix(in srgb, var(--card) 50%, transparent),0 1px 4px var(--shadow);
}
.pill-glass {
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  backdrop-filter:blur(18px) saturate(180%);
  background:color-mix(in srgb, var(--card) 28%, transparent);
  border:1.5px solid color-mix(in srgb, var(--card) 44%, transparent);
  box-shadow:inset 0 2px 8px color-mix(in srgb, var(--card) 40%, transparent),
    inset 0 -1px 3px rgba(0,0,0,.03),
    0 4px 24px color-mix(in srgb, var(--primary) 6%, transparent);
  opacity:0;
}

/* ── Tab buttons ── */
.tab {
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0;cursor:pointer;gap:2px;color:var(--text-light);height:100%;
  position:relative;z-index:1;-webkit-tap-highlight-color:transparent;
}
.tab-icon {
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
.tab-icon svg{width:22px;height:22px}
.tab-lbl {
  font-size:9px;font-weight:500;letter-spacing:.15px;font-family:var(--fd);
  transition:font-size .35s,max-height .35s;
}
.tab.active{color:var(--primary)}
.tab.active .tab-lbl{font-weight:700}

/* ══════════════════════════════════
   APP UI COMPONENTS
   ══════════════════════════════════ */
.view{display:none;animation:vi .2s ease}.view.on{display:block}
@keyframes vi{from{opacity:0;transform:translateY(6px)}}

/* Cards */
.card{background:var(--card);border:2px solid var(--bd);border-radius:var(--cr);padding:10px;overflow:hidden;transition:border-color .15s}
.cov-w{width:var(--cw);height:var(--ch);flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--acl);border:1.5px solid var(--bd);position:relative}
.cov-w img{width:100%;height:100%;object-fit:cover;display:block}
.cov-w .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--txd)}
.cov-s{--cw:48px;--ch:66px}.cov-l{--cw:80px;--ch:110px}
.cov-g{width:100%;padding-bottom:137%;position:relative;border-radius:8px;overflow:hidden;border:2px solid var(--bd);background:var(--acl)}
.cov-g img,.cov-g .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cov-g .ph{display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--txd)}

/* Buttons */
.bp{background:var(--ac);color:var(--card);border:none;border-radius:12px;padding:8px 16px;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .12s}
.bp:active{transform:scale(.97)}.bp:disabled{opacity:.3;cursor:not-allowed}
.bp-s{padding:6px 12px;font-size:12px;border-radius:10px}
.bp-ok{background:var(--ok)}
.bg{background:transparent;color:var(--ac);border:2px solid var(--ac);border-radius:12px;padding:8px 16px;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer}
.bd{background:var(--dng);color:#fff;border:none;border-radius:12px;padding:8px 16px;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer}
.bm{background:var(--bd);color:var(--txd);border:none;border-radius:12px;padding:8px 16px;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer}
.pill-btn{padding:5px 12px;border-radius:16px;border:1.5px solid var(--bd);background:transparent;color:var(--txd);font-family:var(--fd);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.pill-btn.on{background:var(--ac);color:var(--card);border-color:var(--ac)}
.inp{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--ibg);color:var(--tx);font-family:var(--fb);font-size:14px;outline:none}
.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--txd);opacity:.5}

/* Widget Grid */
.wg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wi{background:var(--card);border:2px solid var(--bd);border-radius:var(--cr);padding:12px;cursor:pointer;transition:border-color .15s}
.wi:active{border-color:var(--acd)}.wi.f{grid-column:1/-1}
.wl{font-family:var(--fd);font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.wv{font-family:var(--fd);font-size:26px;font-weight:800;color:var(--ac);line-height:1}
.ws{font-size:10px;color:var(--txd);margin-top:3px}
@media(min-width:768px){.wg{grid-template-columns:repeat(3,1fr);gap:10px}}
@media(min-width:1024px){.wg{grid-template-columns:repeat(4,1fr);gap:12px}.wi.f{grid-column:1/3}}
.rs{display:flex;gap:10px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}.rs::-webkit-scrollbar{display:none}
.ri{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:68px;max-width:74px;text-align:center}
.ri .rt{font-size:10px;font-weight:700;font-family:var(--fd);color:var(--tx);line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ri .rd{font-size:9px;color:var(--txd);font-family:var(--fm)}

/* Calendar */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ch-d{text-align:center;font-size:10px;font-weight:700;font-family:var(--fd);color:var(--txd);padding:3px 0}
.cc{min-height:68px;border-radius:8px;border:1.5px solid var(--bd);padding:2px;display:flex;flex-direction:column;cursor:pointer;transition:all .15s}
.cc:active{border-color:var(--ac)}.cc.td{border:2px solid var(--ac);background:var(--acl)}.cc.ha{background:var(--card)}
.cc .cd{font-size:11px;font-weight:600;font-family:var(--fd);color:var(--tx);text-align:center;line-height:1}
.cc.td .cd{font-weight:800;color:var(--ac)}
.ccv{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;flex:1;align-items:flex-start;margin-top:2px}
.cci{width:26px;height:36px;border-radius:3px;object-fit:cover;border:.5px solid var(--bd)}
.ccp{width:26px;height:36px;border-radius:3px;background:var(--acl);border:.5px dashed var(--bd);font-size:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);color:var(--txd);overflow:hidden;text-align:center;padding:1px}
@media(min-width:768px){.cc{min-height:90px}.cci,.ccp{width:32px;height:44px}}

/* Shelf views */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:500px){.sg{grid-template-columns:repeat(4,1fr)}}
@media(min-width:768px){.sg{grid-template-columns:repeat(5,1fr);gap:10px}}
.sc{cursor:pointer;text-align:center}
.sc .sc-t{font-size:11px;font-weight:700;font-family:var(--fd);color:var(--tx);margin-top:5px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc .sc-c{font-size:10px;color:var(--ac);font-family:var(--fm);margin-top:2px}
.sl{display:flex;flex-direction:column;gap:6px}
.slr{display:flex;gap:10px;padding:10px;align-items:center;cursor:pointer}
.bt{font-family:var(--fd);font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ba{font-size:11px;color:var(--txd)}
.bm2{display:flex;gap:6px;margin-top:2px;font-size:10px;font-family:var(--fm);color:var(--txd)}
.pc{background:var(--card);border:3px solid var(--ac);border-radius:18px;padding:20px;text-align:center;max-width:300px;margin:0 auto;box-shadow:0 4px 16px var(--b1)}

/* Modals */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:250;display:flex;align-items:flex-end;justify-content:center;animation:mfi .15s}
.ms{background:var(--sf);border-radius:16px 16px 0 0;padding:16px;padding-bottom:calc(16px + var(--sb));width:100%;max-height:85vh;overflow-y:auto;animation:msu .2s ease;border-top:2.5px solid var(--cs)}
.ms h3{font-family:var(--fd);font-size:17px;color:var(--ac);margin-bottom:12px}
.ms .gr{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 10px}
@keyframes mfi{from{opacity:0}}@keyframes msu{from{transform:translateY(100%)}}
.tog{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;background:var(--bd)}
.tog.on{background:var(--ac)}.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}.tog.on::after{transform:translateX(18px)}
.toast{position:fixed;top:calc(16px + var(--st));left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:16px;font-size:13px;font-weight:700;font-family:var(--fd);z-index:300;animation:ti .25s ease,to .25s ease 1.5s forwards;color:#fff}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@media(display-mode:standalone){.toast{top:calc(16px + env(safe-area-inset-top,54px))}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr"><div><h1>Storytime Shelf</h1><div class="sub">Bedtime reading tracker</div></div><div class="hdr-r"><button onclick="openSet()" id="gb"></button><button onclick="tgM()" id="mb"></button></div></div>
  <div class="cnt" id="scroll-cnt"><div class="ci" id="ct"></div></div>
</div>

<!-- ═══ LIQUID GLASS NAV: Layer 0 (blur, EMPTY) ═══ -->
<div class="tabbar-blur" id="tabbar-blur"></div>

<!-- ═══ LIQUID GLASS NAV: Layer 2 (icons + pill, NO filter) ═══ -->
<nav class="tabbar" id="tabbar">
  <div class="pill-solid" id="pill-solid"></div>
  <div class="pill-glass" id="pill-glass"></div>
  <div class="tab active" id="tab-0" data-idx="0">
    <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-8 9 8"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg></div>
    <div class="tab-lbl">Home</div>
  </div>
  <div class="tab" id="tab-1" data-idx="1">
    <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="6" width="5" height="14" rx="1"/><rect x="17" y="2" width="5" height="18" rx="1"/><path d="M2 22h20"/></svg></div>
    <div class="tab-lbl">Shelf</div>
  </div>
  <div class="tab" id="tab-2" data-idx="2">
    <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M8 2v4M16 2v4"/></svg></div>
    <div class="tab-lbl">Cal</div>
  </div>
  <div class="tab" id="tab-3" data-idx="3">
    <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.5" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor"/></svg></div>
    <div class="tab-lbl">Tonight</div>
  </div>
  <div class="tab" id="tab-4" data-idx="4">
    <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg></div>
    <div class="tab-lbl">Add</div>
  </div>
</nav>

<script>
/* ══════════════════════════════════════════
   LIQUID GLASS ANIMATION ENGINE
   Per spec: single rAF loop, spring physics,
   two-element pill crossfade, gaussian magnification
   ══════════════════════════════════════════ */
(function(){
  const bar = document.getElementById('tabbar');
  const blurLayer = document.getElementById('tabbar-blur');
  const solidEl = document.getElementById('pill-solid');
  const glassEl = document.getElementById('pill-glass');
  const TAB_COUNT = 5;
  const PILL_REST_W = 66, PILL_REST_H = 50;
  const PILL_DRAG_W = 90, PILL_DRAG_H = 58;

  const tabs = [], icons = [], labels = [];
  for (let i = 0; i < TAB_COUNT; i++) {
    const t = document.getElementById('tab-' + i);
    tabs.push(t);
    icons.push(t.querySelector('.tab-icon'));
    labels.push(t.querySelector('.tab-lbl'));
  }

  const lg = { x:0, tx:0, vx:0, pw:PILL_REST_W, ph:PILL_REST_H, glass:0, drag:false, tab:0 };
  window._lg = lg;

  const center = (i) => { const w = bar.offsetWidth / TAB_COUNT; return w * i + w / 2; };
  const nearest = (x) => { const w = bar.offsetWidth / TAB_COUNT; return Math.max(0, Math.min(TAB_COUNT - 1, Math.round((x - w / 2) / w))); };

  const tick = () => {
    // 1. Position: spring + lerp hybrid
    const stiff = lg.drag ? 0.3 : 0.08;
    const damp = lg.drag ? 0.75 : 0.68;
    lg.vx = (lg.vx + (lg.tx - lg.x) * stiff) * damp;

    if (lg.drag) {
      const ld = (lg.tx - lg.x) * 0.5;
      lg.x += Math.abs(ld) > Math.abs(lg.vx) ? ld : lg.vx;
      if (Math.abs(lg.tx - lg.x) < 0.8) lg.x = lg.tx;
    } else {
      lg.x += lg.vx;
      if (Math.abs(lg.vx) < 0.1 && Math.abs(lg.tx - lg.x) < 0.4) { lg.x = lg.tx; lg.vx = 0; }
      const c = center(lg.tab);
      if (c > 0) lg.tx = c;
    }

    // 2. Pill size
    const tw = lg.drag ? PILL_DRAG_W : PILL_REST_W;
    const th = lg.drag ? PILL_DRAG_H : PILL_REST_H;
    lg.pw += (tw - lg.pw) * 0.1;
    lg.ph += (th - lg.ph) * 0.1;

    // 3. Glass crossfade (fast in, very slow out)
    const gt = lg.drag ? 1 : 0;
    const gr = lg.drag ? 0.14 : 0.016;
    lg.glass += (gt - lg.glass) * gr;
    if (lg.glass < 0.004) lg.glass = 0;

    // 4. Apply pill transforms (GPU only)
    const tf = `translate3d(${lg.x - lg.pw / 2}px, -50%, 0)`;
    const w = lg.pw + 'px', h = lg.ph + 'px', r = lg.ph / 2 + 'px';
    solidEl.style.transform = tf; solidEl.style.width = w; solidEl.style.height = h; solidEl.style.borderRadius = r; solidEl.style.opacity = 1 - lg.glass;
    glassEl.style.transform = tf; glassEl.style.width = w; glassEl.style.height = h; glassEl.style.borderRadius = r; glassEl.style.opacity = lg.glass;

    // 5. Icon magnification: gaussian bell curve
    const tabW = bar.offsetWidth / TAB_COUNT;
    const sigma = tabW * 0.55;
    const s2 = 2 * sigma * sigma;

    for (let i = 0; i < TAB_COUNT; i++) {
      const icon = icons[i], label = labels[i];
      if (!icon) continue;
      const cx = tabW * (i + 0.5);
      const dx = lg.x - cx;
      const bell = Math.exp(-(dx * dx) / s2);
      const df = Math.min(1, lg.glass * 3);
      const scale = 1 + bell * 0.32 * df;
      const lift = -bell * 3 * df;
      icon.style.transform = `translate3d(0,${lift}px,0) scale(${scale})`;
      const active = bell > 0.5;
      icon.parentElement.style.color = active ? 'var(--primary)' : 'var(--text-light)';
      if (label) {
        label.style.opacity = active ? '1' : '0.38';
        label.style.fontWeight = active ? '700' : '500';
      }
    }
    requestAnimationFrame(tick);
  };

  // Pointer events (drag-to-select)
  bar.addEventListener('pointerdown', (e) => {
    bar.setPointerCapture(e.pointerId);
    const r = bar.getBoundingClientRect();
    lg.drag = true;
    lg.tx = Math.max(28, Math.min(r.width - 28, e.clientX - r.left));
  });
  bar.addEventListener('pointermove', (e) => {
    if (!lg.drag) return;
    const r = bar.getBoundingClientRect();
    lg.tx = Math.max(28, Math.min(r.width - 28, e.clientX - r.left));
  });
  const endDrag = () => {
    if (!lg.drag) return;
    lg.drag = false;
    const idx = nearest(lg.tx);
    lg.tab = idx;
    lg.tx = center(idx);
    switchToTab(idx);
  };
  bar.addEventListener('pointerup', endDrag);
  bar.addEventListener('pointercancel', endDrag);

  // Simple tap (no drag)
  tabs.forEach((t, i) => {
    t.addEventListener('click', () => {
      if (!lg.drag) { lg.tab = i; lg.tx = center(i); switchToTab(i); }
    });
  });

  // Scroll → compact mode
  let sTick = false;
  document.getElementById('scroll-cnt').addEventListener('scroll', function() {
    if (sTick) return; sTick = true;
    requestAnimationFrame(() => {
      const scrolled = this.scrollTop > 40;
      bar.classList.toggle('compact', scrolled);
      blurLayer.classList.toggle('compact', scrolled);
      if (!lg.drag) { const c = center(lg.tab); if (c > 0) lg.tx = c; }
      sTick = false;
    });
  }, { passive: true });

  // Init: double rAF for layout measurement
  requestAnimationFrame(() => {
    lg.x = center(lg.tab); lg.tx = lg.x;
    requestAnimationFrame(tick);
  });
})();

  res.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${covers.map((url,i)=>`<div style="cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid var(--bd);aspect-ratio:2/3;background:var(--acl)" onclick="pickCover('${bookId}',${i})"><img src="${esc(url)}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.style.display='none'" loading="lazy"></div>`).join('')}</div>`;
  window._coverOpts=covers;
}

async function fetchCoverOptions(book){
  const covers=[];
  try{
    // By ISBN: multiple sizes
    if(book.isbn){
      covers.push(`https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg`);
      covers.push(`https://covers.openlibrary.org/b/isbn/${book.isbn}-M.jpg`);
    }
    // Search for other editions with different covers
    const q=encodeURIComponent(book.title+(book.author?' '+book.author:''));
    const r=await fetch(`https://openlibrary.org/search.json?q=${q}&limit=6&fields=cover_i,isbn`);
    const d=await r.json();
    if(d.docs){for(const doc of d.docs){
      if(doc.cover_i){
        const url=`https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg`;
        if(!covers.includes(url))covers.push(url);
      }
      if(covers.length>=8)break;
    }}
  }catch{}
  // Deduplicate and limit to 8
  return[...new Set(covers)].slice(0,8);
}

async function pickCover(bookId,idx){
  const url=window._coverOpts?.[idx];if(!url)return;
  try{
    // Fetch and compress the remote image
    const resp=await fetch(url);const blob=await resp.blob();
    const dataUrl=await compressImg(blob.slice?new File([blob],'c.jpg',{type:'image/jpeg'}):blob);
    await db.books.update(bookId,{cover:dataUrl});
    S.bk=await db.books.toArray();
    toast('Cover updated!');
    document.querySelectorAll('.mo').forEach(m=>m.remove());
    rV();
  }catch{
    // Fallback: store URL directly if fetch fails (CORS)
    await db.books.update(bookId,{cover:url});
    S.bk=await db.books.toArray();
    toast('Cover updated!');
    document.querySelectorAll('.mo').forEach(m=>m.remove());
    rV();
  }
}

async function removeCover(bookId){
  await db.books.update(bookId,{cover:''});
  S.bk=await db.books.toArray();
  toast('Cover removed','var(--sec)');
  document.querySelectorAll('.mo').forEach(m=>m.remove());
  rV();
}

c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><button class="bg bp-s" onclick="S.cm--;if(S.cm<0){S.cm=11;S.cy--}rV()">${ic('chL',20)}</button><div style="text-align:center"><div style="font-family:var(--fd);font-size:18px;font-weight:800">${mn}</div>${!ic2?`<button class="bp bp-s" onclick="const n=new Date();S.cy=n.getFullYear();S.cm=n.getMonth();rV()" style="margin-top:3px">Today</button>`:''}</div><button class="bg bp-s" onclick="S.cm++;if(S.cm>11){S.cm=0;S.cy++}rV()">${ic('chR',20)}</button></div><div class="cg" style="margin-bottom:4px">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="ch-d">${d}</div>`).join('')}</div><div class="cg">${cl}</div>`}
async function cDay(ds){const rd=await rFD(ds);const bi={};S.bk.forEach(b=>{bi[b.id]=b});const db2=rd.map(r=>({...r,book:bi[r.bookId]})).filter(r=>r.book);const d=new Date(ds+'T12:00:00'),lb=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}),iF=ds>td();const o=document.createElement('div');o.className='mo';o.id='cdm';o.onclick=e=>{if(e.target===o)o.remove()};swD(o);o.innerHTML=`<div class="ms"><div class="gr"></div><h3>${lb}</h3>${iF?'<div style="font-size:11px;color:var(--sec);font-family:var(--fd);margin-bottom:8px">Planned</div>':''}${db2.length?`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">${db2.map(r=>`<div class="card" style="display:flex;gap:8px;padding:8px;align-items:center">${cv(r.book.cover,r.book.title,'cov-s')}<div style="flex:1;min-width:0"><div class="bt" style="font-size:13px">${esc(r.book.title)}</div><div class="ba">${esc(r.book.author)}</div></div><button class="bm bp-s" onclick="xRd(${r.autoId},'${ds}')" style="color:var(--dng)">✕</button></div>`).join('')}</div>`:`<div style="color:var(--txd);font-size:13px;margin-bottom:12px">No books ${iF?'planned':'read'}.</div>`}<div style="font-family:var(--fd);font-size:12px;color:var(--txd);margin-bottom:6px">Add a book:</div><div style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto">${S.bk.map(b=>`<div class="card" style="display:flex;gap:6px;padding:6px;align-items:center;cursor:pointer" onclick="aRD('${b.id}','${ds}')">${cv(b.cover,b.title,'cov-s')}<div style="flex:1;font-size:12px;font-family:var(--fd);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(b.title)}</div><span style="color:var(--ac);font-size:16px;font-weight:700">+</span></div>`).join('')}</div><button class="bm" style="width:100%;margin-top:10px" onclick="this.closest('.mo').remove()">Close</button></div>`;document.body.appendChild(o)}
async function aRD(id,ds){await lR(id,ds);S.bk=await db.books.toArray();toast('Added!');document.querySelectorAll('.mo').forEach(m=>m.remove());cDay(ds);rV()}

async function rP(c){let ph='';if(S.pk&&!S.ps){const ps=await bS(S.pk.id);ph=`<div class="pc">${cv(S.pk.cover,S.pk.title,'cov-l')}<div style="font-family:var(--fd);font-weight:800;font-size:18px;margin-top:12px">${esc(S.pk.title)}</div>${S.pk.author?`<div style="color:var(--txd);font-size:13px;margin-top:3px">${esc(S.pk.author)}</div>`:''}<div style="font-family:var(--fm);font-size:11px;color:var(--txd);margin-top:8px">${pl(ps.total,'read')} · ${ps.thisWeek} this wk${ps.last?' · '+ps.last:''}</div><button class="bp" onclick="qL('${S.pk.id}')" style="margin-top:12px;width:100%">We Read This Tonight ${ic('check',14)}</button></div>`}else if(S.pk&&S.ps){ph=`<div class="pc" style="border-color:var(--bd);box-shadow:none">${cv(S.pk.cover,S.pk.title,'cov-l')}<div style="font-family:var(--fd);font-weight:800;font-size:16px;margin-top:10px">${esc(S.pk.title)}</div></div>`}c.innerHTML=`<div style="text-align:center;color:var(--txd);font-size:14px;margin-bottom:16px;line-height:1.4">Picks books not yet read this week or read fewest times.</div><div style="text-align:center;margin-bottom:24px"><button class="bp" onclick="dPk()" ${S.bk.length?'':'disabled'} style="font-size:15px;padding:12px 28px;border-radius:24px">${S.pk&&!S.ps?'Pick Again':"What Should We Read?"}</button></div>${ph}${!S.bk.length?'<div style="text-align:center;color:var(--txd)">Add books first!</div>':''}`}
function dPk(){if(!S.bk.length)return;S.ps=true;S.pk=null;let n=0;const iv=setInterval(()=>{S.pk=S.bk[Math.floor(Math.random()*S.bk.length)];rV();n++;if(n>=8){clearInterval(iv);pN(S.bk).then(b=>{S.pk=b;S.ps=false;rV()})}},120)}

/* ══════════════════════════════════════════
   ADD VIEW
   ══════════════════════════════════════════ */
function rA(c){c.innerHTML=`<div style="display:flex;gap:6px;margin-bottom:12px"><button class="pill-btn ${S.am==='search'?'on':''}" onclick="S.am='search';rV()">Search</button><button class="pill-btn ${S.am==='manual'?'on':''}" onclick="S.am='manual';rV()">Manual</button><button class="pill-btn" onclick="oScan()" style="background:var(--sec);color:var(--card);border-color:var(--sec)">${ic('scan',14)} Scan</button></div>${S.am==='search'?rAS():rAM()}`}
function rAS(){return`<div style="display:flex;gap:6px;margin-bottom:8px"><input class="inp" style="flex:1" id="asq" placeholder="Title, author, or ISBN…" onkeydown="if(event.key==='Enter')dSr()"><button class="bp bp-s" onclick="dSr()" ${S.sl?'disabled':''}>${S.sl?'…':'Go'}</button></div><div id="aer"></div><div id="ars" style="display:flex;flex-direction:column;gap:6px">${S.sr.map((r,i)=>`<div class="card" style="display:flex;gap:8px;padding:8px;align-items:center">${cv(r.cover,r.title,'cov-s')}<div style="flex:1;min-width:0"><div class="bt" style="font-size:13px">${esc(r.title)}</div><div class="ba">${esc(r.author)}</div>${r.year?`<div style="font-size:10px;color:var(--txd);font-family:var(--fm)">${esc(r.year)}</div>`:''}</div><button class="bp bp-s" onclick="aSR(${i})">+</button></div>`).join('')}</div>`}
function rAM(){return`<div style="display:flex;flex-direction:column;gap:8px"><input class="inp" id="mt" placeholder="Title *"><input class="inp" id="ma" placeholder="Author"><input class="inp" id="mi" placeholder="ISBN"><input class="inp" id="mp" placeholder="Pages" type="number"><button class="bp" style="width:100%" onclick="dMA()">Add to Shelf</button></div>`}
async function dSr(){const el=document.getElementById('asq');if(!el||!el.value.trim())return;S.sl=true;S.sr=[];rV();const q=el.value;try{S.sr=await searchOL(q.trim());if(!S.sr.length)document.getElementById('aer').innerHTML='<div style="color:var(--dng);font-size:11px;margin-bottom:6px">No results.</div>'}catch{document.getElementById('aer').innerHTML='<div style="color:var(--dng);font-size:11px;margin-bottom:6px">Failed.</div>'}S.sl=false;rV();const n=document.getElementById('asq');if(n){n.value=q;n.focus()}}
async function aSR(i){const r=S.sr[i];if(!r)return;if(S.bk.find(b=>(r.isbn&&b.isbn===r.isbn)||b.title.toLowerCase()===r.title.toLowerCase())){toast('Already on shelf','var(--sec)');return}await aB(r);S.bk=await db.books.toArray();toast('Added!')}
async function dMA(){const t=document.getElementById('mt').value.trim();if(!t){toast('Title required','var(--dng)');return}if(S.bk.find(b=>b.title.toLowerCase()===t.toLowerCase())){toast('Already on shelf','var(--sec)');return}await aB({title:t,author:document.getElementById('ma').value.trim(),isbn:document.getElementById('mi').value.trim(),pageCount:parseInt(document.getElementById('mp').value)||null});S.bk=await db.books.toArray();toast('Added!');rV()}

/* ══════════════════════════════════════════
   BARCODE SCANNER
   ══════════════════════════════════════════ */
let scn=null,scannedISBNs=new Set();
function oScan(){
  scannedISBNs=new Set();
  const o=document.createElement('div');o.className='mo';o.id='so';o.onclick=e=>{if(e.target===o)cScan()};
  o.innerHTML=`<div class="ms" style="max-height:94vh"><div class="gr"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h3 style="margin:0">Scan Books</h3>
      <div style="display:flex;gap:6px;align-items:center">
        <span id="scan-count" style="font-family:var(--fd);font-size:12px;color:var(--ac);font-weight:700"></span>
        <button class="bp bp-s" onclick="cScan()">Done</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--txd);margin-bottom:6px">Scan barcodes one after another — keep going!</div>
    <div id="sb-wrap" style="position:relative;width:100%;border-radius:12px;overflow:hidden;border:3px solid var(--bd);transition:border-color .3s,box-shadow .3s">
      <div id="sb" style="width:100%;min-height:200px;background:#000"></div>
    </div>
    <div id="ss" style="margin-top:6px;text-align:center;font-size:12px;color:var(--txd)"></div>
    <div id="scan-list" style="margin-top:8px;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px"></div>
  </div>`;
  document.body.appendChild(o);stScan();
}
function cScan(){if(scn){try{scn.stop()}catch{}scn=null}const o=document.getElementById('so');if(o)o.remove();rV()}

async function stScan(){
  try{
    scn=new Html5Qrcode('sb');
    await scn.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:140},aspectRatio:1.5},onSc,()=>{});
  }catch{document.getElementById('ss').innerHTML='<div style="color:var(--dng)">Camera unavailable.</div>'}
}

function scanGlow(color,duration){
  const wrap=document.getElementById('sb-wrap');if(!wrap)return;
  wrap.style.borderColor=color;
  wrap.style.boxShadow=`0 0 20px ${color}44, inset 0 0 20px ${color}22`;
  setTimeout(()=>{wrap.style.borderColor='var(--bd)';wrap.style.boxShadow='none'},duration||1200);
}

async function onSc(code){
  const isbn=code.replace(/[\s-]/g,'');
  // Skip if already scanned in this session
  if(scannedISBNs.has(isbn))return;
  scannedISBNs.add(isbn);

  // Green glow feedback
  scanGlow('#22c55e',1500);

  const st=document.getElementById('ss');
  const list=document.getElementById('scan-list');
  const countEl=document.getElementById('scan-count');

  st.innerHTML=`<div style="color:var(--ac);font-weight:700">Found: ${isbn}</div><div style="color:var(--txd)">Looking up…</div>`;

  try{
    const r=await searchOL(isbn);
    if(r.length){
      const b=r[0];
      // Check duplicate on shelf
      const dup=S.bk.find(x=>(b.isbn&&x.isbn===b.isbn)||x.title.toLowerCase()===b.title.toLowerCase());
      if(dup){
        scanGlow('#f59e0b',1000);
        st.innerHTML=`<div style="color:var(--sec);font-weight:600">"${esc(b.title)}" already on shelf</div>`;
        // Add to visual list as skipped
        list.innerHTML=`<div class="card" style="display:flex;gap:6px;padding:6px;align-items:center;opacity:.5">
          ${cv(b.cover,b.title,'cov-s')}<div style="flex:1;min-width:0"><div class="bt" style="font-size:11px">${esc(b.title)}</div><div class="ba" style="font-size:10px">Already added</div></div>
        </div>`+list.innerHTML;
      } else {
        // Add to shelf
        await aB(b);S.bk=await db.books.toArray();
        st.innerHTML=`<div style="color:var(--ok);font-weight:700">Added "${esc(b.title)}"!</div>`;
        // Add to visual list
        list.innerHTML=`<div class="card" style="display:flex;gap:6px;padding:6px;align-items:center;border-color:var(--ok)">
          ${cv(b.cover,b.title,'cov-s')}<div style="flex:1;min-width:0"><div class="bt" style="font-size:11px">${esc(b.title)}</div><div class="ba" style="font-size:10px">${esc(b.author)}</div></div>
          <span style="color:var(--ok);font-size:16px;font-weight:700">✓</span>
        </div>`+list.innerHTML;
        if(countEl)countEl.textContent=`${list.querySelectorAll('.card:not([style*=opacity])').length} added`;
      }
    } else {
      scanGlow('#ef4444',1000);
      st.innerHTML=`<div style="color:var(--dng)">ISBN ${isbn} not found</div>`;
    }
  }catch{
    scanGlow('#ef4444',1000);
    st.innerHTML=`<div style="color:var(--dng)">Lookup failed</div>`;
  }

  // Brief pause then clear status — scanner keeps running
  setTimeout(()=>{
    const s=document.getElementById('ss');
    if(s)s.innerHTML='<div style="color:var(--txd)">Ready for next book…</div>';
  },2000);
}

/* ══════════════════════════════════════════
   SETTINGS (modal from gear icon)
   ══════════════════════════════════════════ */
function openSet(){const o=document.createElement('div');o.className='mo';o.onclick=e=>{if(e.target===o)o.remove()};swD(o);o.innerHTML=`<div class="ms"><div class="gr"></div><h3>Settings</h3><div style="font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:8px">Color Theme</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${Object.entries(TH).map(([id,t])=>`<button onclick="chT('${id}')" style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;border-radius:10px;border:${S.thId===id?'2.5px solid var(--ac)':'1.5px solid var(--bd)'};background:${S.thId===id?'var(--acl)':'transparent'};cursor:pointer"><div style="display:flex;gap:2px"><div style="width:14px;height:14px;border-radius:50%;background:${t.light.ac}"></div><div style="width:14px;height:14px;border-radius:50%;background:${t.light.sec}"></div></div><div style="font-size:9px;font-family:var(--fd);font-weight:600">${t.em} ${t.name.split(' ')[0]}</div></button>`).join('')}</div><div style="font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:8px">Data</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px"><button class="bp" style="width:100%" onclick="doEJ()">Export Backup (JSON)</button><button class="bg" style="width:100%" onclick="doEC()">Export CSV</button><label class="bg" style="width:100%;cursor:pointer;text-align:center">Import<input type="file" accept=".json" onchange="doIm(event)" style="display:none"></label></div><button class="bd" style="width:100%" onclick="doClr()">Clear All Data</button><div style="margin-top:16px;font-size:10px;color:var(--txd);text-align:center;font-family:var(--fm)">Storytime Shelf v3 · IndexedDB · Liquid Glass</div></div>`;document.body.appendChild(o)}
function chT(id){S.thId=id;apT(id,S.mode);sSt('th',id);document.querySelectorAll('.mo').forEach(m=>m.remove());openSet();rV()}
function tgM(){S.mode=S.mode==='light'?'dark':'light';apT(S.thId,S.mode);sSt('mo',S.mode);document.getElementById('mb').innerHTML=S.mode==='dark'?ic('sun',20):ic('moon',20);rV()}
async function doEJ(){const bk=await db.books.toArray(),rd=await db.reads.toArray();dlF(new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),books:bk,reads:rd},null,2)],{type:'application/json'}),`storytime-${td()}.json`);toast('Exported!')}
async function doEC(){const bk=await db.books.toArray(),rd=await db.reads.toArray();const h=['Title','Author','ISBN','Pages','Publisher','Year','Date','#','Total','Added'];const r=[h.join(',')];for(const b of bk){const br=rd.filter(x=>x.bookId===b.id).sort((a,c)=>a.date.localeCompare(c.date));if(!br.length)r.push([b.title,b.author,b.isbn,b.pageCount||'',b.publisher,b.year,'','0','0',b.addedAt?.slice(0,10)||''].map(csvC).join(','));else br.forEach((x,i)=>r.push([b.title,b.author,b.isbn,b.pageCount||'',b.publisher,b.year,x.date,i+1,br.length,b.addedAt?.slice(0,10)||''].map(csvC).join(',')))}dlF(new Blob([r.join('\n')],{type:'text/csv'}),`storytime-${td()}.csv`);toast('Exported!')}
async function doIm(ev){const f=ev.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(!d.books)throw 0;await db.transaction('rw',db.books,db.reads,async()=>{for(const b of d.books){if(!(await db.books.get(b.id)))await db.books.add(b)}if(d.reads)for(const r of d.reads)await db.reads.add({bookId:r.bookId,date:r.date});if(!d.reads&&d.books[0]?.readLog)for(const b of d.books)if(b.readLog)for(const e of b.readLog)await db.reads.add({bookId:b.id,date:e.date||e})});S.bk=await db.books.toArray();toast('Imported!');rV()}catch{toast('Invalid file','var(--dng)')}ev.target.value=''}
function doClr(){const o=document.createElement('div');o.className='mo';o.onclick=e=>{if(e.target===o)o.remove()};swD(o);o.innerHTML=`<div class="ms"><div class="gr"></div><h3 style="color:var(--dng)">Clear All Data?</h3><p style="color:var(--txd);font-size:13px;margin-bottom:12px">Export backup first.</p><div style="display:flex;gap:8px"><button class="bm" style="flex:1" onclick="this.closest('.mo').remove()">Cancel</button><button class="bd" style="flex:1" onclick="xClr()">Clear</button></div></div>`;document.body.appendChild(o)}
async function xClr(){await db.transaction('rw',db.books,db.reads,db.settings,async()=>{await db.books.clear();await db.reads.clear();await db.settings.clear()});S.bk=[];document.querySelectorAll('.mo').forEach(m=>m.remove());toast('Cleared','var(--sec)');rV()}

   INIT
   ══════════════════════════════════════════ */
(async()=>{
  S.bk=await db.books.toArray();
  S.thId=await gSt('th','meadow');S.mode=await gSt('mo','light');
  S.wg=await gSt('wg',S.wg);S.sv=await gSt('sv','list');S.calMode=await gSt('cm2','dots');

  document.getElementById('mb').innerHTML=S.mode==='dark'?ic('sun',20):ic('moon',20);
  document.getElementById('gb').innerHTML=ic('gear',20);
