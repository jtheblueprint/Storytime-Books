<style>
/* ═══ DESIGN TOKENS ═══ */
:root {
  --bg:#F7F3E3;--sf:#EFEADB;--card:#fff;--ac:#4A7C3F;--acl:#D4E8C2;--acd:#8BBF6A;
  --sec:#E88D5A;--tx:#2D3A20;--txd:#6B7A5A;--bd:#D4DCC4;--dng:#C04A3A;--ok:#4A7C3F;
  --ibg:#FDFBF3;--cs:#4A7C3F;
  --b1:rgba(212,232,194,.45);--b2:rgba(244,196,107,.35);--b3:rgba(232,141,90,.3);
  --shadow:rgba(45,58,32,.07);--primary:var(--ac);--text-light:var(--txd);--border-glass:var(--bd);
  --fd:'DM Serif Display',Georgia,serif;--fb:'Nunito',sans-serif;--fm:'JetBrains Mono',monospace;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --cw:64px;--ch:88px;--cr:14px;--bar-h:58px;--bar-compact:48px;--bar-bot:24px;
}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0;background:var(--bg);-webkit-font-smoothing:antialiased}
body{overflow:hidden;color:var(--tx);font-family:var(--fb);transition:background .3s,color .3s}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
#bg-fill{position:fixed;inset:0;background:var(--bg);z-index:-1;transition:background .3s}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ═══ HEADER (translucent on scroll) ═══ */
.hdr{
  position:sticky;top:0;z-index:20;
  padding:8px 16px 12px;padding-top:calc(8px + var(--st));
  display:flex;justify-content:space-between;align-items:center;
  background:var(--sf);border-bottom:none;
  transition:background .3s,backdrop-filter .3s;
}
.hdr::after{
  content:'';position:absolute;bottom:-16px;left:0;right:0;height:16px;
  background:linear-gradient(var(--sf),transparent);
  transition:background .3s;pointer-events:none;
}
@media(display-mode:standalone){.hdr{padding-top:calc(env(safe-area-inset-top,54px) + 4px)}}
.hdr.glass{
  background:color-mix(in srgb,var(--sf) 60%,transparent);
  -webkit-backdrop-filter:blur(24px) saturate(170%);
  backdrop-filter:blur(24px) saturate(170%);
}
.hdr.glass::after{
  background:linear-gradient(color-mix(in srgb,var(--sf) 60%,transparent),transparent);
}
.hdr h1{font-family:var(--fd);font-size:24px;font-weight:400;color:var(--ac);line-height:1.1;letter-spacing:-.3px}
.hdr .sub{font-size:10px;color:var(--txd);margin-top:1px;font-family:var(--fb)}
.hdr-r{display:flex;gap:4px;align-items:center}
.hdr-r button{background:none;border:none;cursor:pointer;padding:5px;display:flex;color:var(--txd);border-radius:8px;transition:background .15s}
.hdr-r button:active{background:var(--acl)}

/* ═══ CONTENT ═══ */
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 12px calc(var(--bar-h) + var(--bar-bot) + var(--sb) + 16px);-webkit-overflow-scrolling:touch}
.ci{max-width:600px;margin:0 auto}
@media(min-width:768px){.ci{max-width:720px}}

/* ═══ LIQUID GLASS NAV ═══ */
.tabbar-blur,.tabbar{position:fixed;left:50%;display:flex;align-items:center;bottom:var(--bar-bot);width:calc(100% - 24px);max-width:456px;height:var(--bar-h);border-radius:calc(var(--bar-h)/2);transition:bottom .4s cubic-bezier(.32,0,.15,1),width .4s cubic-bezier(.32,0,.15,1),height .4s cubic-bezier(.32,0,.15,1),border-radius .4s cubic-bezier(.32,0,.15,1)}
.tabbar-blur{z-index:199;transform:translateX(-50%) translateZ(0);-webkit-backdrop-filter:blur(24px) saturate(170%);backdrop-filter:blur(24px) saturate(170%);will-change:opacity;background:color-mix(in srgb,var(--bg) 68%,transparent);border:1px solid color-mix(in srgb,var(--border-glass) 50%,transparent);box-shadow:0 6px 28px var(--shadow)}
.tabbar-blur::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent)}
.tabbar{z-index:200;overflow:visible;touch-action:none;user-select:none;-webkit-user-select:none;transform:translateX(-50%) translateZ(0);background:transparent!important;border:none!important;box-shadow:none!important}
.tabbar-blur.compact,.tabbar.compact{bottom:10px;width:calc(100% - 40px);height:var(--bar-compact);border-radius:calc(var(--bar-compact)/2)}
.compact .tab-lbl{font-size:0!important;opacity:0!important;max-height:0!important;margin:0!important}
.pill-solid,.pill-glass{position:absolute;top:50%;left:0;will-change:transform,opacity;backface-visibility:hidden;-webkit-backface-visibility:hidden;pointer-events:none}
.pill-solid{background:color-mix(in srgb,var(--primary) 10%,transparent);border:1.5px solid color-mix(in srgb,var(--primary) 14%,transparent);box-shadow:inset 0 1px 1px color-mix(in srgb,var(--card) 50%,transparent),0 1px 4px var(--shadow)}
.pill-glass{-webkit-backdrop-filter:blur(18px) saturate(180%);backdrop-filter:blur(18px) saturate(180%);background:color-mix(in srgb,var(--card) 28%,transparent);border:1.5px solid color-mix(in srgb,var(--card) 44%,transparent);box-shadow:inset 0 2px 8px color-mix(in srgb,var(--card) 40%,transparent),inset 0 -1px 3px rgba(0,0,0,.03),0 4px 24px color-mix(in srgb,var(--primary) 6%,transparent);opacity:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;cursor:pointer;gap:2px;color:var(--text-light);height:100%;position:relative;z-index:1;-webkit-tap-highlight-color:transparent}
.tab-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.tab-icon svg{width:22px;height:22px}
.tab-lbl{font-size:9px;font-weight:500;letter-spacing:.15px;font-family:var(--fb);transition:font-size .35s,max-height .35s}
.tab.active{color:var(--primary)}.tab.active .tab-lbl{font-weight:700}

/* ═══ UI COMPONENTS ═══ */
.view{display:none;animation:vi .2s ease}.view.on{display:block}
@keyframes vi{from{opacity:0;transform:translateY(5px)}}
.card{background:var(--card);border:2px solid var(--bd);border-radius:var(--cr);padding:10px;overflow:hidden;transition:border-color .15s}
.cov-w{width:var(--cw);height:var(--ch);flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--acl);border:1.5px solid var(--bd);position:relative}
.cov-w img{width:100%;height:100%;object-fit:cover;display:block}
.cov-w .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--txd)}
.cov-s{--cw:48px;--ch:66px}.cov-l{--cw:80px;--ch:110px}
.cov-g{width:100%;padding-bottom:137%;position:relative;border-radius:8px;overflow:hidden;border:2px solid var(--bd);background:var(--acl)}
.cov-g img,.cov-g .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cov-g .ph{display:flex;align-items:center;justify-content:center;color:var(--txd)}
.bp{background:var(--ac);color:var(--card);border:none;border-radius:12px;padding:8px 16px;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .12s}
.bp:active{transform:scale(.97)}.bp:disabled{opacity:.3;cursor:not-allowed}
.bp-s{padding:6px 12px;font-size:12px;border-radius:10px}
.bp-ok{background:var(--ok)}
.bg{background:transparent;color:var(--ac);border:2px solid var(--ac);border-radius:12px;padding:8px 16px;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer}
.bd-btn{background:var(--dng);color:#fff;border:none;border-radius:12px;padding:8px 16px;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer}
.bm-btn{background:var(--bd);color:var(--txd);border:none;border-radius:12px;padding:8px 16px;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer}
.pill-btn{padding:5px 12px;border-radius:16px;border:1.5px solid var(--bd);background:transparent;color:var(--txd);font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.pill-btn.on{background:var(--ac);color:var(--card);border-color:var(--ac)}
.inp{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--ibg);color:var(--tx);font-family:var(--fb);font-size:14px;outline:none}
.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--txd);opacity:.5}

/* Widgets */
.wg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wi{background:var(--card);border:2px solid var(--bd);border-radius:var(--cr);padding:12px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.wi:active{border-color:var(--acd)}.wi.f{grid-column:1/-1}
.wl{font-family:var(--fb);font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-weight:700}
.wv{font-family:var(--fd);font-size:28px;color:var(--ac);line-height:1}
.ws{font-size:10px;color:var(--txd);margin-top:3px}
@media(min-width:768px){.wg{grid-template-columns:repeat(3,1fr);gap:10px}}

/* Recent strip */
.rs{display:flex;gap:10px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.ri{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:68px;max-width:74px;text-align:center}
.ri .rt{font-size:10px;font-weight:700;font-family:var(--fb);color:var(--tx);line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ri .rd{font-size:9px;color:var(--txd);font-family:var(--fm)}

/* Calendar */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ch-d{text-align:center;font-size:10px;font-weight:700;font-family:var(--fb);color:var(--txd);padding:3px 0}
.cc{min-height:68px;border-radius:8px;border:1.5px solid var(--bd);padding:2px;display:flex;flex-direction:column;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.cc:active{border-color:var(--ac)}.cc.td{border:2px solid var(--ac);background:var(--acl)}.cc.ha{background:var(--card)}
.cc .cd{font-size:11px;font-weight:600;font-family:var(--fb);color:var(--tx);text-align:center;line-height:1}
.cc.td .cd{font-weight:800;color:var(--ac)}
.ccv{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;flex:1;align-items:flex-start;margin-top:2px}
.cci{width:26px;height:36px;border-radius:3px;object-fit:cover;border:.5px solid var(--bd)}
.ccp{width:26px;height:36px;border-radius:3px;background:var(--acl);border:.5px dashed var(--bd);font-size:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fb);color:var(--txd);overflow:hidden;text-align:center;padding:1px}
@media(min-width:768px){.cc{min-height:90px}.cci,.ccp{width:32px;height:44px}}

/* Shelf */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:500px){.sg{grid-template-columns:repeat(4,1fr)}}
@media(min-width:768px){.sg{grid-template-columns:repeat(5,1fr)}}
.sc{cursor:pointer;text-align:center}
.sc .sc-t{font-size:11px;font-weight:700;font-family:var(--fb);color:var(--tx);margin-top:5px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc .sc-c{font-size:10px;color:var(--ac);font-family:var(--fm);margin-top:2px}
.sl{display:flex;flex-direction:column;gap:6px}
.slr{display:flex;gap:10px;padding:10px;align-items:center;cursor:pointer}
.bt{font-family:var(--fb);font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ba{font-size:11px;color:var(--txd)}
.bm2{display:flex;gap:6px;margin-top:2px;font-size:10px;font-family:var(--fm);color:var(--txd)}

/* Pick card */
.pc{background:var(--card);border:3px solid var(--ac);border-radius:18px;padding:20px;text-align:center;max-width:300px;margin:0 auto;box-shadow:0 4px 16px var(--b1)}

/* Carousel book picker */
.carousel{display:flex;gap:10px;overflow-x:auto;padding:6px 2px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.carousel::-webkit-scrollbar{display:none}
.car-item{min-width:90px;max-width:96px;scroll-snap-align:center;cursor:pointer;text-align:center;flex-shrink:0;padding:6px;border-radius:12px;border:2px solid var(--bd);background:var(--card);transition:border-color .15s}
.car-item:active{border-color:var(--ac)}
.car-item .cov-w{--cw:78px;--ch:106px;margin:0 auto}
.car-item .sc-t{font-size:9px;font-weight:700;margin-top:4px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;display:flex;align-items:center;justify-content:center;padding:16px;animation:mfi .15s}
.ms{background:var(--sf);border-radius:18px;padding:20px;padding-bottom:calc(20px + var(--sb));width:100%;max-width:400px;max-height:80vh;overflow-y:auto;animation:msu .25s cubic-bezier(.32,0,.15,1);border:1.5px solid var(--bd);box-shadow:0 16px 48px rgba(0,0,0,.25)}
.ms h3{font-family:var(--fd);font-size:18px;color:var(--ac);margin-bottom:12px}
.ms .gr{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 12px}
@keyframes mfi{from{opacity:0}}@keyframes msu{from{opacity:0;transform:scale(.95) translateY(12px)}}

/* Toggle */
.tog{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;background:var(--bd)}
.tog.on{background:var(--ac)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.tog.on::after{transform:translateX(18px)}

/* Toast */
.toast{position:fixed;top:calc(16px + var(--st));left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:16px;font-size:13px;font-weight:700;font-family:var(--fb);z-index:300;animation:ti .25s ease,to .25s ease 1.5s forwards;color:#fff}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@media(display-mode:standalone){.toast{top:calc(16px + env(safe-area-inset-top,54px))}}

/* Doodle watermarks */
.doodle{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:.12}
</style>
</head>
<body>
<div id="bg-fill"></div>
<div id="app">
<div class="hdr" id="hdr">
  <div><h1>Storytime Shelf</h1><div class="sub">Bedtime reading tracker</div></div>
  <div class="hdr-r"><button onclick="openSet()" id="gb"></button></div>
</div>
<div class="cnt" id="scroll-cnt"><div class="ci" id="ct"></div></div>
</div>
<div class="tabbar-blur" id="tabbar-blur"></div>
<nav class="tabbar" id="tabbar">
<div class="pill-solid" id="pill-solid"></div>
<div class="pill-glass" id="pill-glass"></div>
<div class="tab active" id="tab-0" data-idx="0"><div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-8 9 8"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg></div><div class="tab-lbl">Home</div></div>
<div class="tab" id="tab-1" data-idx="1"><div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="6" width="5" height="14" rx="1"/><rect x="17" y="2" width="5" height="18" rx="1"/><path d="M2 22h20"/></svg></div><div class="tab-lbl">Shelf</div></div>
<div class="tab" id="tab-2" data-idx="2"><div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M8 2v4M16 2v4"/></svg></div><div class="tab-lbl">Cal</div></div>
<div class="tab" id="tab-3" data-idx="3"><div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.5" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor"/></svg></div><div class="tab-lbl">Tonight</div></div>
<div class="tab" id="tab-4" data-idx="4"><div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg></div><div class="tab-lbl">Add</div></div>
</nav>

<script>
/* ═══════════════════════════════════════
   LIQUID GLASS NAV ENGINE
   ═══════════════════════════════════════ */
(function(){
const bar=document.getElementById('tabbar'),blur=document.getElementById('tabbar-blur');
const solidEl=document.getElementById('pill-solid'),glassEl=document.getElementById('pill-glass');
const N=5,PW=66,PH=50,DW=90,DH=58;
const tabs=[],icons=[],labels=[];
for(let i=0;i<N;i++){const t=document.getElementById('tab-'+i);tabs.push(t);icons.push(t.querySelector('.tab-icon'));labels.push(t.querySelector('.tab-lbl'))}
const lg={x:0,tx:0,vx:0,pw:PW,ph:PH,glass:0,drag:false,tab:0};
window._lg=lg;
const ctr=i=>{const w=bar.offsetWidth/N;return w*i+w/2};
const nrst=x=>{const w=bar.offsetWidth/N;return Math.max(0,Math.min(N-1,Math.round((x-w/2)/w)))};
const tick=()=>{
  const st=lg.drag?.3:.08,dm=lg.drag?.75:.68;
  lg.vx=(lg.vx+(lg.tx-lg.x)*st)*dm;

async function gS(bk){
  const ar=await db.reads.toArray(),w=ws();
  const rc={};ar.forEach(r=>{rc[r.bookId]=(rc[r.bookId]||0)+1});
  let mi=null,mc=0;for(const[id,c]of Object.entries(rc))if(c>mc){mi=id;mc=c}
  const ad=new Set(ar.map(r=>r.date));let sk=0;

  const sc=eligible.map(b=>({book:b,score:(!wc[b.id]?50:0)+da(lr[b.id])*2+Math.max(0,10-(rc[b.id]||0))*3+Math.random()*10}));
  sc.sort((a,b)=>b.score-a.score);const p=sc.slice(0,Math.min(5,sc.length));
  const ts=p.reduce((s,x)=>s+x.score,0);let r=Math.random()*ts;

}

  const r=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=8&fields=key,title,author_name,isbn,cover_i,publisher,first_publish_year,number_of_pages_median`);const d=await r.json();
  return(d.docs||[]).map(x=>({title:x.title||'',author:(x.author_name||[]).join(', '),isbn:(x.isbn||[])[0]||'',cover:x.cover_i?`https://covers.openlibrary.org/b/id/${x.cover_i}-M.jpg`:'',pageCount:x.number_of_pages_median||null,publisher:(x.publisher||[]).slice(0,2).join(', '),year:x.first_publish_year?String(x.first_publish_year):''}))

}

function compressImg(file,maxW=300){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*(maxW/w));w=maxW}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.7))};img.onerror=rej;img.src=e.target.result};r.onerror=rej;r.readAsDataURL(file)})}

async function sCov(id){const b=S.bk.find(x=>x.id===id);if(!b)return;const r=document.getElementById('cov-r');r.innerHTML='<div style="color:var(--txd);font-size:11px;padding:8px 0">Searching…</div>';const covers=[];try{if(b.isbn){covers.push(`https://covers.openlibrary.org/b/isbn/${b.isbn}-L.jpg`,`https://covers.openlibrary.org/b/isbn/${b.isbn}-M.jpg`)}const q=encodeURIComponent(b.title+(b.author?' '+b.author:''));const res=await fetch(`https://openlibrary.org/search.json?q=${q}&limit=6&fields=cover_i`);const d=await res.json();if(d.docs)for(const doc of d.docs){if(doc.cover_i&&covers.length<8)covers.push(`https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg`)}}catch{}if(!covers.length){r.innerHTML='<div style="color:var(--dng);font-size:11px">No covers found.</div>';return}window._covOpts=covers;r.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${covers.map((u,i)=>`<div style="cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid var(--bd);aspect-ratio:2/3;background:var(--acl)" onclick="pCov('${id}',${i})"><img src="${esc(u)}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.style.display='none'" loading="lazy"></div>`).join('')}</div>`}
async function pCov(id,i){const u=window._covOpts?.[i];if(!u)return;try{const r=await fetch(u);const bl=await r.blob();const du=await compressImg(new File([bl],'c.jpg',{type:'image/jpeg'}));await db.books.update(id,{cover:du});S.bk=await db.books.toArray();toast('Cover updated!');document.querySelectorAll('.mo').forEach(m=>m.remove());rV()}catch{await db.books.update(id,{cover:u});S.bk=await db.books.toArray();toast('Cover updated!');document.querySelectorAll('.mo').forEach(m=>m.remove());rV()}}
async function rmCov(id){await db.books.update(id,{cover:''});S.bk=await db.books.toArray();toast('Removed','var(--sec)');document.querySelectorAll('.mo').forEach(m=>m.remove());rV()}

function chMode(m){S.modeP=m;apT(S.thId,resolveMode());sSt('modeP',m);document.querySelectorAll('.mo').forEach(m=>m.remove());openSet();rV()}

async function doEJ(){const bk=await db.books.toArray(),rd=await db.reads.toArray();dlF(new Blob([JSON.stringify({version:3,exportedAt:new Date().toISOString(),books:bk,reads:rd},null,2)],{type:'application/json'}),`storytime-${td()}.json`);toast('Exported!')}
async function doEC(){const bk=await db.books.toArray(),rd=await db.reads.toArray();const h=['Title','Author','ISBN','Pages','Publisher','Year','Date','#','Total','Added'];const r=[h.join(',')];for(const b of bk){const br=rd.filter(x=>x.bookId===b.id).sort((a,c)=>a.date.localeCompare(c.date));if(!br.length)r.push([b.title,b.author,b.isbn,b.pageCount||'',b.publisher,b.year,'','0','0',b.addedAt?.slice(0,10)||''].map(csvC).join(','));else br.forEach((x,i)=>r.push([b.title,b.author,b.isbn,b.pageCount||'',b.publisher,b.year,x.date,i+1,br.length,b.addedAt?.slice(0,10)||''].map(csvC).join(',')))}dlF(new Blob([r.join('\n')],{type:'text/csv'}),`storytime-${td()}.csv`);toast('Exported!')}
async function doIm(ev){const f=ev.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(!d.books)throw 0;await db.transaction('rw',db.books,db.reads,async()=>{for(const b of d.books){if(!(await db.books.get(b.id)))await db.books.add(b)}if(d.reads)for(const r of d.reads)await db.reads.add({bookId:r.bookId,date:r.date});if(!d.reads&&d.books[0]?.readLog)for(const b of d.books)if(b.readLog)for(const e of b.readLog)await db.reads.add({bookId:b.id,date:e.date||e})});S.bk=await db.books.toArray();toast('Imported!');rV()}catch{toast('Invalid file','var(--dng)')}ev.target.value=''}
function doClr(){const o=document.createElement('div');o.className='mo';o.onclick=e=>{if(e.target===o)o.remove()};swD(o);o.innerHTML=`<div class="ms"><div class="gr"></div><h3 style="color:var(--dng)">Clear All Data?</h3><p style="color:var(--txd);font-size:13px;margin-bottom:12px">Export backup first.</p><div style="display:flex;gap:8px"><button class="bm-btn" style="flex:1" onclick="this.closest('.mo').remove()">Cancel</button><button class="bd-btn" style="flex:1" onclick="xClr()">Clear</button></div></div>`;document.body.appendChild(o)}
async function xClr(){await db.transaction('rw',db.books,db.reads,db.settings,async()=>{await db.books.clear();await db.reads.clear();await db.settings.clear()});S.bk=[];document.querySelectorAll('.mo').forEach(m=>m.remove());toast('Cleared','var(--sec)');rV()}

(async()=>{
  S.bk=await db.books.toArray();
  S.thId=await gSt('th','meadow');

  S.wg=await gSt('wg',S.wg);

  S.calMode=await gSt('cm2','dots');
  S.doodles=await gSt('doodles',true);
  S.recentCount=await gSt('rc',5);
  apT(S.thId,resolveMode());
  document.getElementById('gb').innerHTML=ic('gear',22);
  // Listen for system dark mode changes (auto mode)
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(S.modeP==='auto')apT(S.thId,resolveMode())});
  rV();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
